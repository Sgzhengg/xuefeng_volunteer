<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学锋志愿教练 - 专业版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2196F3;
            --primary-dark: #1976D2;
            --secondary-color: #FFC107;
            --success-color: #4CAF50;
            --warning-color: #FF9800;
            --error-color: #F44336;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Tabs */
        .tabs {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 80px;
            z-index: 90;
        }

        .tabs-container {
            display: flex;
            gap: 0;
        }

        .tab {
            flex: 1;
            padding: 16px 24px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            position: relative;
        }

        .tab:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .tab.active {
            color: var(--primary-color);
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-color);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        /* Content */
        .content {
            padding: 30px 0;
            min-height: calc(100vh - 200px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Chat Section */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 250px);
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary-color);
            color: white;
        }

        .message.ai .message-avatar {
            background: var(--secondary-color);
            color: white;
        }

        .message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }

        .message.user .message-bubble {
            background: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            outline: none;
            font-size: 16px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            border-color: var(--primary-color);
        }

        .send-button {
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .send-button:active {
            transform: translateY(0);
        }

        /* Simulator Section */
        .simulator-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .simulator-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 12px;
            text-align: center;
        }

        .simulator-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .form-select {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .generate-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .generate-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .generate-button:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid var(--border-color);
            display: none;
        }

        .result-section.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .plan-category {
            margin-bottom: 30px;
        }

        .plan-category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .plan-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .plan-badge.rush {
            background: var(--error-color);
        }

        .plan-badge.stable {
            background: var(--warning-color);
        }

        .plan-badge.safe {
            background: var(--success-color);
        }

        .plan-badge.backup {
            background: var(--text-secondary);
        }

        .plan-schools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .school-card {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid;
            transition: all 0.3s;
            cursor: pointer;
        }

        .school-card:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        .school-card.rush {
            border-left-color: var(--error-color);
        }

        .school-card.stable {
            border-left-color: var(--warning-color);
        }

        .school-card.safe {
            border-left-color: var(--success-color);
        }

        .school-card.backup {
            border-left-color: var(--text-secondary);
        }

        .school-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .school-score {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .school-probability {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* History and Profile Sections */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .tabs-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .tab {
                white-space: nowrap;
                padding: 14px 20px;
                font-size: 14px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .plan-schools {
                grid-template-columns: 1fr;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>学锋志愿教练</h1>
                </div>
                <div class="header-actions">
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span>服务正常运行</span>
                    </div>
                    <button class="tab" onclick="showAbout()">
                        <i class="fas fa-info-circle"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <div class="container">
            <div class="tabs-container">
                <button class="tab active" onclick="switchTab('chat', this)">
                    <i class="fas fa-comments"></i> 和老师聊
                </button>
                <button class="tab" onclick="switchTab('simulator', this)">
                    <i class="fas fa-calculator"></i> 志愿模拟器
                </button>
                <button class="tab" onclick="switchTab('history', this)">
                    <i class="fas fa-history"></i> 历史记录
                </button>
                <button class="tab" onclick="switchTab('profile', this)">
                    <i class="fas fa-user"></i> 我的
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main class="content">
        <div class="container">
            <!-- Chat Tab -->
            <div id="chat" class="tab-content active">
                <div class="chat-container">
                    <div class="messages" id="messages">
                        <div class="message ai">
                            <div class="message-avatar">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <div class="message-content">
                                <div class="message-header">
                                    <span>学锋老师</span>
                                    <span>刚刚</span>
                                </div>
                                <div class="message-bubble">
                                    你好！我是学锋，你的高考志愿填报AI教练。有什么问题尽管问我！记住，志愿填报要考虑分数、专业、就业、城市等多个因素。
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea
                            class="message-input"
                            id="messageInput"
                            placeholder="输入你的问题，比如：我600分，想学计算机，能上浙大吗？"
                            rows="1"
                            onkeypress="handleKeyPress(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button class="send-button" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                            <span>发送</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Simulator Tab -->
            <div id="simulator" class="tab-content">
                <div class="simulator-container">
                    <h2 class="simulator-title">志愿模拟器</h2>
                    <p class="simulator-subtitle">智能分析，为你制定专属的冲稳保垫志愿方案</p>

                    <form class="form-grid" onsubmit="generatePlan(event)">
                        <div class="form-group">
                            <label class="form-label">省份</label>
                            <input type="text" class="form-input" id="province" placeholder="例如：江苏" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">分数</label>
                            <input type="number" class="form-input" id="score" placeholder="例如：600" min="200" max="750" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">科类</label>
                            <select class="form-select" id="subject" required>
                                <option value="">请选择科类</option>
                                <option value="物理">物理</option>
                                <option value="历史">历史</option>
                                <option value="综合">综合</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">目标专业</label>
                            <input type="text" class="form-input" id="major" placeholder="例如：计算机科学与技术" required>
                        </div>
                    </form>

                    <button type="submit" class="generate-button" onclick="generatePlan()">
                        <i class="fas fa-magic"></i>
                        <span id="generateText">生成志愿方案</span>
                        <span id="generateSpinner" class="spinner" style="display: none;"></span>
                    </button>

                    <div id="resultSection" class="result-section">
                        <h3 class="result-title">
                            <i class="fas fa-chart-line"></i>
                            你的专属志愿方案
                        </h3>

                        <div class="plan-category">
                            <div class="plan-category-header">
                                <span class="plan-badge rush">冲刺院校</span>
                                <span>录取概率 30-50%</span>
                            </div>
                            <div class="plan-schools" id="rushSchools"></div>
                        </div>

                        <div class="plan-category">
                            <div class="plan-category-header">
                                <span class="plan-badge stable">稳妥院校</span>
                                <span>录取概率 60-80%</span>
                            </div>
                            <div class="plan-schools" id="stableSchools"></div>
                        </div>

                        <div class="plan-category">
                            <div class="plan-category-header">
                                <span class="plan-badge safe">保底院校</span>
                                <span>录取概率 85-95%</span>
                            </div>
                            <div class="plan-schools" id="safeSchools"></div>
                        </div>

                        <div class="plan-category">
                            <div class="plan-category-header">
                                <span class="plan-badge backup">垫底院校</span>
                                <span>录取概率 95%+</span>
                            </div>
                            <div class="plan-schools" id="backupSchools"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Tab -->
            <div id="history" class="tab-content">
                <div class="empty-state">
                    <i class="fas fa-history"></i>
                    <h3>历史记录</h3>
                    <p>你的聊天记录和志愿方案将保存在这里</p>
                </div>
            </div>

            <!-- Profile Tab -->
            <div id="profile" class="tab-content">
                <div class="empty-state">
                    <i class="fas fa-user"></i>
                    <h3>个人中心</h3>
                    <p>个人信息、设置等功能开发中</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // API Configuration
        const API_URL = 'http://localhost:5000';

        // Tab Switching
        function switchTab(tabName, tabButton) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab content
            document.getElementById(tabName).classList.add('active');

            // Add active class to clicked tab
            tabButton.classList.add('active');
        }

        // Chat Functions
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            addMessage(message, true);
            input.value = '';
            autoResize(input);

            // Show typing indicator
            showTypingIndicator();

            // Call API
            callChatAPI(message);
        }

        function addMessage(text, isUser = false) {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas fa-${isUser ? 'user' : 'user-tie'}"></i>
                </div>
                <div class="message-content">
                    <div class="message-header">
                        <span>${isUser ? '我' : '学锋老师'}</span>
                        <span>${time}</span>
                    </div>
                    <div class="message-bubble">${text}</div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesContainer = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';

            typingDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;

            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        async function callChatAPI(message) {
            try {
                const response = await fetch(`${API_URL}/api/v1/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                hideTypingIndicator();
                addMessage(data.message);
            } catch (error) {
                console.error('API调用失败:', error);
                hideTypingIndicator();

                // Fallback response
                addMessage('学锋老师：抱歉，服务暂时不可用，这是一个模拟回复。你的问题是：' + message + '。\n\n记住，志愿填报要理性分析，不要盲目跟风。建议结合自己的兴趣、分数和就业前景来选择。');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // Simulator Functions
        async function generatePlan(event) {
            if (event) event.preventDefault();

            const generateBtn = document.querySelector('.generate-button');
            const generateText = document.getElementById('generateText');
            const generateSpinner = document.getElementById('generateSpinner');

            // Show loading state
            generateText.textContent = '生成中';
            generateSpinner.style.display = 'inline-block';
            generateBtn.disabled = true;

            // Get form values
            const province = document.getElementById('province').value;
            const score = parseInt(document.getElementById('score').value);
            const subject = document.getElementById('subject').value;
            const major = document.getElementById('major').value;

            try {
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 2000));

                // Generate mock plan
                const plan = generateMockPlan(score, major);

                // Display results
                displayPlan(plan);

                // Show result section
                document.getElementById('resultSection').classList.add('show');

            } catch (error) {
                console.error('生成方案失败:', error);
                alert('生成方案失败，请稍后重试');
            } finally {
                // Reset button state
                generateText.textContent = '生成志愿方案';
                generateSpinner.style.display = 'none';
                generateBtn.disabled = false;
            }
        }

        function generateMockPlan(score, major) {
            const baseScore = score;

            return {
                rush: [
                    { name: '浙江大学', score: baseScore + 20, probability: '30%' },
                    { name: '南京大学', score: baseScore + 15, probability: '35%' },
                    { name: '复旦大学', score: baseScore + 10, probability: '40%' }
                ],
                stable: [
                    { name: '东南大学', score: baseScore, probability: '65%' },
                    { name: '厦门大学', score: baseScore - 5, probability: '70%' },
                    { name: '华南理工大学', score: baseScore - 10, probability: '75%' }
                ],
                safe: [
                    { name: '苏州大学', score: baseScore - 20, probability: '85%' },
                    { name: '扬州大学', score: baseScore - 25, probability: '90%' },
                    { name: '江苏大学', score: baseScore - 30, probability: '92%' }
                ],
                backup: [
                    { name: '南通大学', score: baseScore - 40, probability: '95%' },
                    { name: '江苏师范大学', score: baseScore - 45, probability: '97%' },
                    { name: '南京工业大学', score: baseScore - 50, probability: '99%' }
                ]
            };
        }

        function displayPlan(plan) {
            const categories = [
                { key: 'rush', id: 'rushSchools' },
                { key: 'stable', id: 'stableSchools' },
                { key: 'safe', id: 'safeSchools' },
                { key: 'backup', id: 'backupSchools' }
            ];

            categories.forEach(({ key, id }) => {
                const container = document.getElementById(id);
                container.innerHTML = '';

                plan[key].forEach(school => {
                    const schoolCard = document.createElement('div');
                    schoolCard.className = `school-card ${key}`;
                    schoolCard.innerHTML = `
                        <div class="school-name">${school.name}</div>
                        <div class="school-score">
                            <span>录取分：${school.score}分</span>
                            <span class="school-probability">概率：${school.probability}</span>
                        </div>
                    `;

                    schoolCard.onclick = () => showSchoolDetail(school);
                    container.appendChild(schoolCard);
                });
            });
        }

        function showSchoolDetail(school) {
            alert(`学校：${school.name}\n录取分数：${school.score}分\n录取概率：${school.probability}\n\n注：以上为模拟数据，实际录取分数线以官方公布为准。`);
        }

        // About Dialog
        function showAbout() {
            const aboutContent = `
                <h2>关于学锋志愿教练</h2>
                <p>学锋志愿教练是一款基于张雪峰风格的高考志愿填报AI教练应用。</p>

                <h3>特色功能：</h3>
                <ul>
                    <li>🎭 学锋风格对话 - 诙谐幽默，直击要点</li>
                    <li>📊 智能志愿推荐 - 基于分数精准匹配</li>
                    <li>🎯 冲稳保垫分析 - 科学规划志愿梯度</li>
                    <li>📈 实时数据查询 - 最新录取信息</li>
                    <li>🎨 现代化界面 - 简洁美观，操作便捷</li>
                </ul>

                <h3>当前版本：</h3>
                <p>1.0.0 (Web专业版)</p>

                <h3>技术支持：</h3>
                <p>后端：Flask + FastAPI</p>

                <p style="margin-top: 20px; color: #666; font-size: 14px;">
                    ⚠️ 免责声明：本应用提供的志愿建议仅供参考，实际志愿填报请以各省教育考试院官方信息为准。
                </p>
            `;

            // Create modal dialog
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;

            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: white;
                padding: 30px;
                border-radius: 12px;
                max-width: 500px;
                max-height: 80vh;
                overflow-y: auto;
                position: relative;
            `;

            modalContent.innerHTML = `
                <button onclick="this.closest('.modal').remove()" style="
                    position: absolute;
                    top: 15px;
                    right: 15px;
                    background: none;
                    border: none;
                    font-size: 24px;
                    cursor: pointer;
                    color: #999;
                ">×</button>
                ${aboutContent}
            `;

            modal.className = 'modal';
            modal.appendChild(modalContent);
            document.body.appendChild(modal);

            // Close on outside click
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function(e) {
            autoResize(e.target);
        });
    </script>
