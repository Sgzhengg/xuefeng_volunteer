name: xuefeng_volunteer_coach
description: 张雪峰风格的高考志愿填报AI教练
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  flutter_chat_ui: ^1.6.10
  flutter_chat_types: ^3.6.2

  # 网络 & API
  http: ^1.1.0
  dio: ^5.4.0
  json_annotation: ^4.8.1
  envied: ^0.5.4+1

  # 本地存储
  shared_preferences: ^2.2.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.1

  # 语音输入
  permission_handler: ^11.1.0

  # 工具
  freezed_annotation: ^2.4.1
  intl: ^0.18.1
  share_plus: ^7.2.1

  # PDF生成
  pdf: ^3.10.7
  printing: ^5.11.1

  # 图表
  fl_chart: ^0.65.0

  # Markdown渲染
  flutter_markdown: ^0.6.18+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/skill/
    - assets/data/
    - assets/images/
